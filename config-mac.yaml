projects:
  - id: auto-deal-eth
    name: Auto Deal ETH
    script_path: '/Users/mac/frontend/code/1.operations/auto-deal-eth'
    venv_path: "venv"
    scripts:
      - id: run-calendar
        name: Calendar Runner
        icon: "🛰"
        run: "python -m getinfo.run_calendar"
        use_agent: true
        agent_type: "qwen"
        schedule:
          mode: interval
          seconds: 6000000
      - id: binance_market_lists_selenium
        name: Binance Market Lists Selenium
        icon: "🔎"
        run: "python binance_market_lists_selenium.py"
        cdp: true
        pass_action: false
        use_agent: true
        agent_type: "qwen"
        schedule:
          mode: interval
          seconds: 1800

  - id: python-ai-operate
    name: Auto Deal ETH
    script_path: '/Users/mac/frontend/code/1.operations/python-ai-operate'
    venv_path: "venv"
    scripts:
      - id: crawler
        name: Crawler
        icon: "🛰"
        run: "python crawler.py"
        schedule:
          mode: interval
          seconds: 6000000
      - id: create
        name: Create
        icon: "🛰"
        run: "python create.py"
        schedule:
          mode: interval
          seconds: 6000000
      - id: publish
        name: Publish
        icon: "🛰"
        run: "python publish.py"
        schedule:
          mode: interval
          seconds: 6000000

# 与「CDP」页对应：先结束占用 remote_debugging_port 的进程，再启动 Chrome（一目录一账号环境）
cdp_profiles:
  - id: chrome-debug
    name: Chrome 调试（示例）
    chrome_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
    user_data_dir: "/Users/mac/frontend/chrome-debug"
    remote_debugging_port: 9222
    # 若仍占端口，可改为 true（会 killall Google Chrome，慎用）
    after_port_kill_killall_chrome: false

# 与「数据」页对应：爬虫产出的 JSON 路径（id / name / path）
data_views:
  - id: binance-posts-state
    name: 币安动态状态
    path: "/Users/mac/frontend/code/1.operations/auto-deal-eth/binance_posts_state.json"
  - id: trendradar-posts-state
    name: TrendRadar / X 推文
    path: "/Users/mac/frontend/code/1.operations/python-ai-operate/output/trendradar_posts_state.json"