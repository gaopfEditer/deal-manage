projects:
  - id: auto-deal-eth
    name: Auto Deal ETH
    script_path: 'D:\frontend\main\python\auto-deal-eth'
    venv_path: "venv"
    scripts:
      - id: run-calendar
        name: Calendar Runner
        icon: "🛰"
        run: "python -m getinfo.run_calendar"
        use_agent: true
        agent_type: "qwen"
        schedule:
          mode: interval
          seconds: 6000000
      - id: binance_market_lists_selenium
        name: Binance Market Lists Selenium
        icon: "🔎"
        run: "python binance_market_lists_selenium.py"
        cdp: true
        pass_action: false
        use_agent: true
        agent_type: "qwen"
        schedule:
          mode: interval
          seconds: 6000000

  - id: python-ai-operate
    name: Auto Deal ETH
    script_path: 'D:\frontend\main\python\TrendRadar'
    venv_path: "venv"
    scripts:
      - id: crawler
        name: Crawler
        icon: "🛰"
        run: "python crawler.py"
        schedule:
          mode: interval
          seconds: 6000000
      - id: create
        name: Create
        icon: "🛰"
        run: "python create.py"
        schedule:
          mode: interval
          seconds: 6000000
      - id: publish
        name: Publish
        icon: "🛰"
        run: "python publish.py"
        schedule:
          mode: interval
          seconds: 6000000

# CDP：在 Web「CDP」页按配置结束占用端口的进程并启动 Chrome
cdp_profiles: 
  - id: chrome-debug-default
    name: Chrome 调试（示例）
    # Windows 路径请用单引号，避免双引号里 \ 被当成转义（如 \G 会报错）
    chrome_path: 'C:\Program Files\Google\Chrome\Application\chrome.exe'
    user_data_dir: 'D:\chrome_debug_profile'
    remote_debugging_port: 9222
    # 若仍占端口，可改为 true（会 killall Google Chrome，慎用）
    after_port_kill_killall_chrome: false
    twitter_profile_dir: 'D:\twitter_profile'
    keys:
      - twitter_api_key
      - twitter_api_secret_key
      - twitter_access_token
      - twitter_access_token_secret
