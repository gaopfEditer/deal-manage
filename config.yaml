# CDP：在 Web「CDP」页按配置结束占用端口的进程并启动 Chrome
cdp_profiles: 
  - id: chrome-debug-default
    name: Chrome 调试（示例）
    # Windows 路径请用单引号，避免双引号里 \ 被当成转义（如 \G 会报错）
    chrome_path: 'C:\Program Files\Google\Chrome\Application\chrome.exe'
    user_data_dir: 'D:\chrome_debug_profile'
    remote_debugging_port: 9222
    # 若仍占端口，可改为 true（会 killall Google Chrome，慎用）
    after_port_kill_killall_chrome: false
    twitter_profile_dir: 'D:\twitter_profile'
    keys:
      - twitter_api_key
      - twitter_api_secret_key
      - twitter_access_token
      - twitter_access_token_secret

# run.py 在 IS_RUN_WITH_CDP=true 时读取该段：
# 1) 先启动 cdp profile
# 2) 按 interval_seconds 循环触发 bootstrap_scripts 的 fetch
cdp_runtime:
  profile_id: chrome-debug-default
  interval_seconds: 10
  bootstrap_scripts:
    - auto-deal-eth-binance_market_lists_selenium
    - python-ai-operate-crawler

# 数据视图：JSON 文件路径 → 卡片（记录条数 / 已浏览 / 未读），浏览计数存在 manager/state/data_views_browse.json
data_views:
  - id: binance-posts-state
    name: 广场动态状态
    path: 'D:\frontend\main\python\auto-deal-eth\binance_posts_state.json'
  - id: trendradar-posts-state
    name: TrendRadar / X 推文
    path: 'D:\frontend\main\python\TrendRadar\output\trendradar_posts_state.json'
