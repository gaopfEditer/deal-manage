projects:
  - id: auto-deal-eth
    name: Auto Deal ETH
    script_path: 'D:\frontend\main\python\auto-deal-eth'
    venv_path: "venv"
    scripts:
      - id: run-calendar
        name: Calendar Runner
        icon: "🛰"
        run: "python -m getinfo.run_calendar"
        use_agent: true
        agent_type: "qwen"
        schedule:
          mode: interval
          seconds: 6000000
      - id: binance_market_lists_selenium
        name: Binance Market Lists Selenium
        icon: "🔎"
        run: "python binance_market_lists_selenium.py"
        cdp: true
        pass_action: false
        use_agent: true
        agent_type: "qwen"
        schedule:
          mode: interval
          seconds: 6000000
